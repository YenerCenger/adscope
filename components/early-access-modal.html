<div id="early-access-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-[120] flex items-center justify-center px-4" role="dialog" aria-modal="true" aria-labelledby="early-access-title">
    <div class="bg-slate-900 border border-slate-700 rounded-2xl max-w-lg w-full shadow-2xl animate-fade-in-scale relative">
        <button id="close-early-access-modal" type="button" class="absolute top-3 right-3 text-slate-400 hover:text-white transition-all hover:rotate-90" aria-label="Kapat">
            <i class="fa-solid fa-times text-xl"></i>
        </button>
        <div class="p-6 sm:p-8">
            <h3 id="early-access-title" class="text-2xl font-bold text-white mb-2">Erken Erişim Talebi</h3>
            <p class="text-slate-400 text-sm mb-6">
                E-posta adresini bırak, lansmandan önce TrendCatcher AI&apos;yı deneyebileceğin davet linkini gönderelim.
            </p>

            <form id="early-access-form" class="space-y-4">
                <div class="text-left">
                    <label for="ea-email" class="block text-xs font-semibold text-slate-300 mb-1 uppercase tracking-wide">E-posta adresi</label>
                    <input id="ea-email" name="email" type="email" required placeholder="ornek@firma.com"
                           class="w-full px-3 py-2 rounded-md bg-slate-800 border border-slate-700 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div class="text-left grid sm:grid-cols-2 gap-4">
                    <div>
                        <label for="ea-role" class="block text-xs font-semibold text-slate-300 mb-1 uppercase tracking-wide">Rolün</label>
                        <select id="ea-role" name="role"
                                class="w-full px-3 py-2 rounded-md bg-slate-800 border border-slate-700 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                            <option value="">Seç (opsiyonel)</option>
                            <option value="creator">İçerik Üreticisi</option>
                            <option value="marketer">Performance Marketer</option>
                            <option value="agency">Ajans Sahibi / Çalışanı</option>
                            <option value="brand">Marka Sahibi</option>
                        </select>
                    </div>
                    <div>
                        <label for="ea-country" class="block text-xs font-semibold text-slate-300 mb-1 uppercase tracking-wide">Hedef pazar</label>
                        <select id="ea-country" name="country"
                                class="w-full px-3 py-2 rounded-md bg-slate-800 border border-slate-700 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                            <option value="">Seç (opsiyonel)</option>
                            <option value="us">ABD</option>
                            <option value="de">Almanya</option>
                            <option value="tr">Türkiye</option>
                            <option value="other">Diğer</option>
                        </select>
                    </div>
                </div>
                <div class="text-left">
                    <label for="ea-note" class="block text-xs font-semibold text-slate-300 mb-1 uppercase tracking-wide">Kısaca kullanım amacın</label>
                    <textarea id="ea-note" name="note" rows="3" placeholder="Örn: TikTok reklam kreatiflerini analiz etmek ve yeni script fikirleri üretmek istiyorum."
                              class="w-full px-3 py-2 rounded-md bg-slate-800 border border-slate-700 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                </div>

                <button id="submit-early-access" type="submit"
                        class="w-full mt-2 bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-semibold py-2.5 rounded-lg text-sm flex items-center justify-center gap-2 transition-all hover:shadow-lg hover:shadow-indigo-500/40">
                    <i class="fa-solid fa-envelope-open-text"></i>
                    Erken erişim talebini gönder
                </button>

                <p class="text-[11px] text-slate-500 mt-2 text-center">
                    Şimdilik yalnızca iletişim almak için topluyoruz. Daha sonra bu formu Supabase ile gerçek kullanıcı oluşturma akışına bağlayabilirsin.
                </p>
            </form>
        </div>
    </div>
</div>
